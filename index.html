<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Music Player</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Music">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #1a1a2e;
            color: #eee;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh;
            padding: 20px;
        }

        .player {
            background: #16213e;
            border-radius: 24px;
            padding: 28px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.6);
        }

        .cover-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            margin-bottom: 22px;
            border-radius: 16px;
            overflow: hidden;
        }
        .cover {
            width: 100%;
            height: 100%;
            border-radius: 16px;
            display: block;
            background: #0f3460;
        }
        #vizCanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .meta { margin-bottom: 20px; }
        .song-name { font-size: 1.15rem; font-weight: 700; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-artist { font-size: 0.88rem; color: #888; }

        .progress-wrap {
            margin-bottom: 16px;
        }
        .progress-bar {
            background: #0f3460;
            border-radius: 4px;
            height: 4px;
            cursor: pointer;
            position: relative;
            margin-bottom: 6px;
        }
        .progress-fill {
            background: #e94560;
            height: 100%;
            border-radius: 4px;
            width: 0%;
            transition: width 0.25s linear;
            pointer-events: none;
        }
        .time-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.72rem;
            color: #555;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 22px;
        }
        .ctrl-btn {
            background: none;
            border: none;
            color: #ccc;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        .ctrl-btn:active { background: #0f3460; }

        .play-btn {
            background: #e94560 !important;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            color: #fff !important;
        }
        .play-btn:active { background: #c73652 !important; }

        .volume-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .vol-icon { color: #555; flex-shrink: 0; }

        input[type=range] {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            background: #0f3460;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #e94560;
            border-radius: 50%;
            cursor: pointer;
        }
        input[type=range]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            background: #e94560;
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }

        .file-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 18px;
            padding: 10px;
            border: 1.5px dashed #333;
            border-radius: 12px;
            color: #666;
            font-size: 0.85rem;
            cursor: pointer;
            background: none;
            width: 100%;
            -webkit-tap-highlight-color: transparent;
        }
        .file-btn:active { background: #0f3460; color: #ccc; }

        .playlist {
            margin-top: 12px;
            max-height: 220px;
            overflow-y: auto;
        }
        .pl-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            -webkit-tap-highlight-color: transparent;
        }
        .pl-item:active, .pl-item.active { background: #0f3460; }
        .pl-item.active { color: #e94560; }
        .pl-num { color: #444; width: 18px; text-align: right; flex-shrink: 0; font-size: 0.75rem; }
        .pl-info { overflow: hidden; }
        .pl-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .pl-artist { font-size: 0.75rem; color: #555; }

        .eq-section {
            margin-top: 18px;
            background: #0f3460;
            border-radius: 14px;
            padding: 14px 16px 10px;
        }
        .eq-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 0.78rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .eq-reset {
            background: none;
            border: none;
            color: #e94560;
            font-size: 0.75rem;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 6px;
            -webkit-tap-highlight-color: transparent;
        }
        .eq-reset:active { background: #16213e; }
        .eq-bands {
            display: flex;
            justify-content: space-around;
            gap: 8px;
        }
        .eq-band {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            flex: 1;
        }
        .eq-db {
            font-size: 0.7rem;
            color: #e94560;
            height: 16px;
            font-weight: 600;
        }
        .eq-slider-wrap {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        input[type=range].eq-slider {
            -webkit-appearance: slider-vertical;
            appearance: slider-vertical;
            writing-mode: vertical-lr;
            direction: rtl;
            width: 28px;
            height: 90px;
            background: transparent;
            flex: none;
        }
        input[type=range].eq-slider::-webkit-slider-runnable-track {
            width: 4px;
            background: #1a1a2e;
            border-radius: 4px;
        }
        input[type=range].eq-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #e94560;
            border-radius: 50%;
            margin-left: -8px;
        }
        input[type=range].eq-slider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: #e94560;
            border-radius: 50%;
            border: none;
        }
        .eq-label {
            font-size: 0.72rem;
            color: #555;
        }
    </style>
    <script>if('serviceWorker' in navigator && location.protocol !== 'file:') navigator.serviceWorker.register('sw.js');</script>
</head>
<body>
<div class="player">
    <div class="cover-wrap">
        <canvas class="cover" id="cover" width="500" height="500"></canvas>
        <canvas id="vizCanvas" width="500" height="500"></canvas>
    </div>

    <div class="meta">
        <div class="song-name" id="songName"></div>
        <div class="song-artist" id="songArtist"></div>
    </div>

    <div class="progress-wrap">
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="time-row">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
        </div>
    </div>

    <div class="controls">
        <!-- Prev -->
        <button class="ctrl-btn" onclick="prev()" aria-label="Previous">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>

        <!-- Play/Pause -->
        <button class="ctrl-btn play-btn" id="playBtn" onclick="togglePlay()" aria-label="Play">
            <svg id="playIcon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
                <path d="M8 5v14l11-7z"/>
            </svg>
        </button>

        <!-- Next -->
        <button class="ctrl-btn" onclick="next()" aria-label="Next">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18 14.5 12 6 6v12zm10-12v12h2V6h-2z"/></svg>
        </button>
    </div>

    <div class="volume-row">
        <svg class="vol-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z"/></svg>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.02" value="1" oninput="setVolume(this.value)" aria-label="Volume">
        <svg class="vol-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
    </div>

    <div class="eq-section">
        <div class="eq-header">
            <span>Equalizer</span>
            <button class="eq-reset" onclick="resetEQ()">Reset</button>
        </div>
        <div class="eq-bands">
            <div class="eq-band">
                <div class="eq-db" id="bassDb">0 dB</div>
                <div class="eq-slider-wrap">
                    <input type="range" class="eq-slider" id="bassSlider" min="-12" max="12" step="0.5" value="0" oninput="setEQ('bass', this.value)">
                </div>
                <div class="eq-label">Bass</div>
            </div>
            <div class="eq-band">
                <div class="eq-db" id="midDb">0 dB</div>
                <div class="eq-slider-wrap">
                    <input type="range" class="eq-slider" id="midSlider" min="-12" max="12" step="0.5" value="0" oninput="setEQ('mid', this.value)">
                </div>
                <div class="eq-label">Mid</div>
            </div>
            <div class="eq-band">
                <div class="eq-db" id="trebleDb">0 dB</div>
                <div class="eq-slider-wrap">
                    <input type="range" class="eq-slider" id="trebleSlider" min="-12" max="12" step="0.5" value="0" oninput="setEQ('treble', this.value)">
                </div>
                <div class="eq-label">Treble</div>
            </div>
        </div>
    </div>

    <label class="file-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-6 10v-3h-4v-2h4V8l4 4-4 4z"/></svg>
        Load local files
        <input type="file" id="fileInput" accept=".mp3,.m4a,.aac,.wav,.flac,.ogg" multiple onchange="loadLocalFiles(this.files)"
               style="position:fixed;top:-200px;left:-200px;width:0;height:0;opacity:0;">
    </label>

    <div id="playlist" class="playlist"></div>
</div>

<audio id="audio" preload="none"></audio>

<script>
// Add your own songs here — put MP3 files in a songs/ folder and use relative paths like "songs/my-song.mp3"
const songs = [
    // V-pop: punchy bass, boosted mid for vocals, slight treble air
    { name: 'Chung ta cua hien tai', artist: 'Son Tung MTP',            src: 'songs/01-chung-ta-cua-hien-tai.mp3', eq: { bass:  4, mid:  3, treble:  2 } },
    // Acoustic pop: neutral bass, warm mid, gentle treble sparkle
    { name: 'Let me down slowly',    artist: 'Alec Benjamin',           src: 'songs/02-let-me-down-slowly.mp3',   eq: { bass:  0, mid:  2, treble:  3 } },
    // Chillout EDM: deep bass, scooped mid, bright treble
    { name: 'Give me your love',     artist: 'DEAM',                    src: 'songs/03-give-me-your-love.mp3',    eq: { bass:  5, mid: -2, treble:  4 } },
    // Chillout EDM: same treatment, slightly warmer
    { name: 'Without you',           artist: 'DEAM',                    src: 'songs/04-without-you.mp3',          eq: { bass:  4, mid: -1, treble:  3 } },
    // Acoustic ballad: minimal bass, forward mid for guitar/vocal, airy treble
    { name: 'Perfect',               artist: 'Ed Sheeran',              src: 'songs/05-perfect.mp3',              eq: { bass:  1, mid:  4, treble:  3 } },
    // Chillout EDM: wide bass, scooped mid, crisp treble
    { name: 'Rendezvous',            artist: 'DEAM',                    src: 'songs/06-rendezvous.mp3',           eq: { bass:  5, mid: -3, treble:  4 } },
    // Melodic dubstep: heavy bass, cut mid for impact, high treble for synths
    { name: 'Fractures',             artist: 'Illenium & Nevve',        src: 'songs/07-fractures.mp3',            eq: { bass:  6, mid: -4, treble:  5 } },
    // Festival EDM: max bass punch, scooped mid, elevated treble
    { name: 'Mayday',                artist: 'TheFatRat & Laura Brehm', src: 'songs/08-mayday.mp3',               eq: { bass:  7, mid: -3, treble:  5 } },
    // Ambient EDM: soft bass, warm mid, subtle treble
    { name: 'Solitude',              artist: 'TheFatRat & Slaydit',     src: 'songs/09-solitude.mp3',             eq: { bass:  3, mid:  1, treble:  2 } },
    // Uplifting EDM: strong bass, slight mid cut, bright treble
    { name: 'Chosen',                artist: 'TheFatRat & Laura Brehm', src: 'songs/10-chosen.mp3',               eq: { bass:  6, mid: -2, treble:  4 } },
];

const audio       = document.getElementById('audio');
if (location.protocol !== 'file:') audio.crossOrigin = 'anonymous'; // must be before first src for Web Audio API
const coverCanvas = document.getElementById('cover');
const coverCtx    = coverCanvas.getContext('2d');
const songName    = document.getElementById('songName');
const songArtist  = document.getElementById('songArtist');
const progressFill= document.getElementById('progressFill');
const progressBar = document.getElementById('progressBar');
const currentTimeEl = document.getElementById('currentTime');
const durationEl  = document.getElementById('duration');
const playIcon    = document.getElementById('playIcon');

const ICON_PLAY  = '<path d="M8 5v14l11-7z"/>';
const ICON_PAUSE = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';

let idx = 0;

function fmt(s) {
    if (!s || isNaN(s)) return '0:00';
    return `${Math.floor(s / 60)}:${String(Math.floor(s % 60)).padStart(2, '0')}`;
}

// Generate a unique gradient cover from the song title
function drawCover(title, artist) {
    const W = 500;
    const ctx = coverCtx;

    // Deterministic hue from title string
    let h1 = 0, h2 = 0;
    for (let i = 0; i < title.length; i++) h1 = (h1 * 31 + title.charCodeAt(i)) & 0xffff;
    for (let i = 0; i < (artist||'').length; i++) h2 = (h2 * 31 + artist.charCodeAt(i)) & 0xffff;
    const hue1 = h1 % 360;
    const hue2 = (hue1 + 40 + (h2 % 80)) % 360;

    // Background gradient
    const bg = ctx.createLinearGradient(0, 0, W, W);
    bg.addColorStop(0, `hsl(${hue1},60%,25%)`);
    bg.addColorStop(1, `hsl(${hue2},70%,15%)`);
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, W);

    // Decorative circles
    const accent = `hsl(${hue1},80%,60%)`;
    ctx.save();
    ctx.globalAlpha = 0.12;
    ctx.fillStyle = accent;
    ctx.beginPath(); ctx.arc(W * 0.75, W * 0.25, W * 0.45, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(W * 0.2,  W * 0.8,  W * 0.35, 0, Math.PI * 2); ctx.fill();
    ctx.restore();

    // Music note icon (center)
    ctx.save();
    ctx.fillStyle = `hsla(${hue1},80%,80%,0.25)`;
    ctx.font = '200px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('♫', W / 2, W / 2 - 30);
    ctx.restore();

    // Artist name (small, upper area)
    if (artist) {
        ctx.fillStyle = `hsla(${hue1},60%,85%,0.7)`;
        ctx.font = 'bold 28px -apple-system, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'alphabetic';
        ctx.fillText(artist.toUpperCase(), W / 2, W * 0.72);
    }

    // Song title (large, bottom area) — word-wrap
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 46px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    const maxW = W - 60;
    const words = title.split(' ');
    const lines = [];
    let line = '';
    for (const w of words) {
        const test = line ? line + ' ' + w : w;
        if (ctx.measureText(test).width > maxW && line) { lines.push(line); line = w; }
        else line = test;
    }
    if (line) lines.push(line);
    // Scale down font if any single line still overflows
    let fontSize = 46;
    const maxLineW = Math.max(...lines.map(l => ctx.measureText(l).width));
    if (maxLineW > maxW) {
        fontSize = Math.floor(46 * maxW / maxLineW);
        ctx.font = `bold ${fontSize}px -apple-system, sans-serif`;
    }
    const lineH = 54;
    const startY = W * 0.82 - ((lines.length - 1) * lineH) / 2;
    lines.forEach((l, i) => ctx.fillText(l, W / 2, startY + i * lineH));
}

function updateMediaSession() {
    if (!('mediaSession' in navigator) || !songs[idx]) return;
    const s = songs[idx];
    navigator.mediaSession.metadata = new MediaMetadata({
        title: s.name,
        artist: s.artist,
        artwork: [{ src: coverCanvas.toDataURL(), sizes: '500x500', type: 'image/png' }],
    });
}

function loadSong(autoplay) {
    const s = songs[idx];
    drawCover(s.name, s.artist);
    songName.textContent   = s.name;
    songArtist.textContent = s.artist;
    progressFill.style.width = '0%';
    currentTimeEl.textContent = '0:00';
    durationEl.textContent    = '0:00';

    updateMediaSession();
    loadEQ(idx);

    // Safari: pause before src swap to avoid decoder getting stuck between tracks
    audio.pause();
    audio.src = s.src;
    if (autoplay) {
        audio.play().catch(() => {});
    } else {
        audio.load(); // fetch metadata (duration) without autoplaying
    }
}

function togglePlay() {
    if (audio.paused) {
        audio.play().catch(() => {});
    } else {
        audio.pause();
    }
}

function next() {
    if (!songs.length) return;
    const wasPlaying = !audio.paused;
    idx = (idx + 1) % songs.length;
    loadSong(wasPlaying);
    renderPlaylist();
}

function prev() {
    if (!songs.length) return;
    if (audio.currentTime > 3) {
        audio.currentTime = 0;
        // still update lock screen metadata for current song
        updateMediaSession();
        return;
    }
    const wasPlaying = !audio.paused;
    idx = (idx - 1 + songs.length) % songs.length;
    loadSong(wasPlaying);
    renderPlaylist();
}

function setVolume(v) {
    audio.volume = v;
}

// Sync play/pause icon with actual audio state
audio.addEventListener('play',  () => { playIcon.innerHTML = ICON_PAUSE; });
audio.addEventListener('pause', () => { playIcon.innerHTML = ICON_PLAY; });

audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
    currentTimeEl.textContent = fmt(audio.currentTime);
});

audio.addEventListener('loadedmetadata', () => {
    durationEl.textContent = fmt(audio.duration);
});

audio.addEventListener('ended', next);

// Seek — use touch position on mobile, mouse on desktop
function seekTo(clientX) {
    if (!audio.duration) return;
    const r = progressBar.getBoundingClientRect();
    audio.currentTime = Math.max(0, Math.min(1, (clientX - r.left) / r.width)) * audio.duration;
}
progressBar.addEventListener('click', e => seekTo(e.clientX));
progressBar.addEventListener('touchend', e => {
    e.preventDefault();
    seekTo(e.changedTouches[0].clientX);
}, { passive: false });

// ─── Media Session API ────────────────────────────────────────────────────────
// Required for iPod Air headphone button: double-click=next, triple-click=prev
// Also drives lock screen / Control Center on iPhone
if ('mediaSession' in navigator) {
    navigator.mediaSession.setActionHandler('play',  () => audio.play().catch(() => {}));
    navigator.mediaSession.setActionHandler('pause', () => audio.pause());
    navigator.mediaSession.setActionHandler('nexttrack',     next);
    navigator.mediaSession.setActionHandler('previoustrack', prev);
    // seekbackward/seekforward shown in Control Center scrubber on iOS
    navigator.mediaSession.setActionHandler('seekbackward', () => { audio.currentTime = Math.max(0, audio.currentTime - 10); });
    navigator.mediaSession.setActionHandler('seekforward',  () => { audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 10); });
    navigator.mediaSession.setActionHandler('seekto', e => { if (e.seekTime != null) audio.currentTime = e.seekTime; });
    // Update playback position for lock screen scrubber
    audio.addEventListener('timeupdate', () => {
        if (!audio.duration) return;
        navigator.mediaSession.setPositionState({
            duration: audio.duration,
            playbackRate: audio.playbackRate,
            position: audio.currentTime,
        });
    });
}

// ─── Local file loading ───────────────────────────────────────────────────────
function loadLocalFiles(files) {
    if (!files.length) return;

    // Pause current playback before revoking blob URLs
    audio.pause();
    songs.forEach(s => { if (s.blob) URL.revokeObjectURL(s.src); });
    Object.keys(eqStore).forEach(k => delete eqStore[k]);

    const newSongs = Array.from(files).map(f => ({
        name:   f.name.replace(/\.[^.]+$/, ''),
        artist: '',
        src:    URL.createObjectURL(f),
        blob:   true,
    }));

    songs.splice(0, songs.length, ...newSongs);
    idx = 0;
    renderPlaylist();
    loadSong(false);
}

function renderPlaylist() {
    const pl = document.getElementById('playlist');
    pl.innerHTML = '';
    songs.forEach((s, i) => {
        const el = document.createElement('div');
        el.className = 'pl-item' + (i === idx ? ' active' : '');

        const num = document.createElement('span');
        num.className = 'pl-num';
        num.textContent = i + 1;

        const info = document.createElement('div');
        info.className = 'pl-info';

        const name = document.createElement('div');
        name.className = 'pl-name';
        name.textContent = s.name;
        info.appendChild(name);

        if (s.artist) {
            const artist = document.createElement('div');
            artist.className = 'pl-artist';
            artist.textContent = s.artist;
            info.appendChild(artist);
        }

        el.appendChild(num);
        el.appendChild(info);
        el.addEventListener('click', () => { idx = i; loadSong(true); renderPlaylist(); });
        pl.appendChild(el);
    });
}

// ─── Equalizer (Web Audio API) ────────────────────────────────────────────────
let audioCtx, srcNode, filterBass, filterMid, filterTreble;
const eqStore = {}; // per-song EQ settings keyed by idx

function initAudioGraph() {
    if (audioCtx) return;
    if (location.protocol === 'file:') return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    srcNode = audioCtx.createMediaElementSource(audio);

    filterBass   = audioCtx.createBiquadFilter();
    filterMid    = audioCtx.createBiquadFilter();
    filterTreble = audioCtx.createBiquadFilter();

    filterBass.type   = 'lowshelf';  filterBass.frequency.value   = 200;
    filterMid.type    = 'peaking';   filterMid.frequency.value    = 1000; filterMid.Q.value = 1;
    filterTreble.type = 'highshelf'; filterTreble.frequency.value = 3000;

    // filterTreble → destination connected here; startViz() will insert analyser in between
    srcNode.connect(filterBass).connect(filterMid).connect(filterTreble).connect(audioCtx.destination);
}

function setEQ(band, value) {
    initAudioGraph();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    const gain = Number(value);
    if (band === 'bass')   { filterBass.gain.value   = gain; document.getElementById('bassDb').textContent   = (gain > 0 ? '+' : '') + gain + ' dB'; }
    if (band === 'mid')    { filterMid.gain.value    = gain; document.getElementById('midDb').textContent    = (gain > 0 ? '+' : '') + gain + ' dB'; }
    if (band === 'treble') { filterTreble.gain.value = gain; document.getElementById('trebleDb').textContent = (gain > 0 ? '+' : '') + gain + ' dB'; }
    // Save per song
    if (!eqStore[idx]) eqStore[idx] = { bass: 0, mid: 0, treble: 0 };
    eqStore[idx][band] = gain;
}

function loadEQ(songIdx) {
    const eq = eqStore[songIdx] || (songs[songIdx] && songs[songIdx].eq) || { bass: 0, mid: 0, treble: 0 };
    document.getElementById('bassSlider').value   = eq.bass;
    document.getElementById('midSlider').value    = eq.mid;
    document.getElementById('trebleSlider').value = eq.treble;
    document.getElementById('bassDb').textContent   = (eq.bass   > 0 ? '+' : '') + eq.bass   + ' dB';
    document.getElementById('midDb').textContent    = (eq.mid    > 0 ? '+' : '') + eq.mid    + ' dB';
    document.getElementById('trebleDb').textContent = (eq.treble > 0 ? '+' : '') + eq.treble + ' dB';
    if (audioCtx) {
        filterBass.gain.value   = eq.bass;
        filterMid.gain.value    = eq.mid;
        filterTreble.gain.value = eq.treble;
    }
}

function resetEQ() {
    delete eqStore[idx]; // remove user override → loadEQ falls back to song preset
    loadEQ(idx);
}

// Resume AudioContext on first play (required by iOS)
audio.addEventListener('play', () => {
    const isNew = !audioCtx;
    initAudioGraph();
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (isNew) { loadEQ(idx); startViz(); }
    else if (!vizRaf) vizLoop(); // restart loop if it stopped after fade-out
});

// ─── Visualizer ───────────────────────────────────────────────────────────────
const vizCanvas = document.getElementById('vizCanvas');
const vizCtx    = vizCanvas.getContext('2d');
let analyser, vizRaf;
// Single state variable: 1 = playing (full bars), 0 = stopped (bars gone)
// When paused, vizAlpha counts down each frame until 0 → single RAF loop, no races
let vizAlpha = 0;
let lastData = null;

function startViz() {
    if (!audioCtx || analyser) return;
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 128;
    lastData = new Uint8Array(analyser.frequencyBinCount); // allocated once
    filterTreble.connect(analyser);
    analyser.connect(audioCtx.destination);
    try { filterTreble.disconnect(audioCtx.destination); } catch(_) {}
    vizLoop();
}

function vizLoop() {
    vizRaf = requestAnimationFrame(vizLoop);
    const W = vizCanvas.width, H = vizCanvas.height;
    const useBins = Math.floor(analyser.frequencyBinCount * 0.75);

    if (!audio.paused) {
        analyser.getByteFrequencyData(lastData);
        vizAlpha = 1;
    } else {
        vizAlpha -= 0.04;
        if (vizAlpha <= 0) {
            vizAlpha = 0;
            vizCtx.clearRect(0, 0, W, H);
            cancelAnimationFrame(vizRaf);
            vizRaf = null;
            return;
        }
    }

    vizCtx.clearRect(0, 0, W, H);
    for (let i = 0; i < useBins; i++) {
        const v    = (lastData[i] / 255) * vizAlpha;
        const barH = v * H * 0.55;
        if (barH < 1) continue;
        const x   = i * (W / useBins);
        const w   = W / useBins - 2;
        const hue = 340 + i * (200 / useBins);
        vizCtx.fillStyle = `hsla(${hue % 360}, 80%, 60%, ${0.5 + v * 0.5})`;
        vizCtx.beginPath();
        vizCtx.roundRect(x, H - barH, w, barH, 3);
        vizCtx.fill();
    }
}

loadSong(false);
renderPlaylist();

</script>
